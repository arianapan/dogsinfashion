<div style="max-width: 440px; margin: 0 auto; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: #FFF9F0; border-radius: 16px; overflow: hidden;">
  <div style="background: linear-gradient(135deg, #7CC6D6 0%, #F9B356 100%); padding: 32px 24px; text-align: center;">
    <span style="font-size: 40px;">🐾</span>
    <h1 style="color: #ffffff; font-size: 22px; margin: 12px 0 0;">Dogs in Fashion</h1>
  </div>
  <div style="padding: 36px 32px; text-align: center;">
    <p style="color: #5C4B3A; font-size: 16px; margin: 0 0 8px;">Your verification code is</p>
    <div style="background-color: #ffffff; border: 2px solid #7CC6D6; border-radius: 12px; padding: 20px; margin: 20px 0;">
      <span style="font-size: 36px; font-weight: 700; letter-spacing: 10px; color: #3A3A3A;">{{ .Token }}</span>
    </div>
    <p style="color: #9A8C7F; font-size: 14px; margin: 20px 0 0;">This code expires in 10 minutes.<br>If you didn't request this, you can safely ignore this email.</p>
  </div>
  <div style="background-color: #F0E6D6; padding: 16px; text-align: center;">
    <p style="color: #9A8C7F; font-size: 12px; margin: 0;">Dogs in Fashion · Sacramento, CA</p>
  </div>
</div>
